psram:
  mode: octal
  speed: 80MHz

i2s_audio:
  - id: i2s_bus
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO6

speaker:
  - platform: i2s_audio
    id: i2s_audio_speaker
    i2s_audio_id: i2s_bus
    dac_type: external
    i2s_dout_pin: GPIO5
    sample_rate: 44100
    buffer_duration: 1000ms
    bits_per_sample: 16bit

  - platform: mixer
    id: mixing_speaker
    output_speaker: i2s_audio_speaker
    num_channels: 2
    source_speakers:
      - id: announcement_mixing_input
      - id: media_mixing_input

  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: 44100
  
  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: 44100

# === Sendspin additions ===
sendspin:

media_source:
  - platform: sendspin
    id: sendspin_media_source
    # Optional tuning (adjust if you have noticeable lag)
    # sample_rate: 44100
    # fixed_delay: 0ms
    # initial_static_delay: 0ms   # can be tuned from Music Assistant


media_player:
  # === Local Speaker Media Player (for direct playback control) ===
  - platform: speaker
    id: external_media_player
    name: "Media Player (Local)"    ### CHANGE AS REQUIRED ###
    internal: false
    volume_min: 0.4
    volume_max: 0.95
    volume_increment: 0.05

    # Both pipelines are now required
    announcement_pipeline:
      speaker: announcement_resampling_speaker
      format: FLAC
      num_channels: 1 
      sample_rate: 48000

    media_pipeline:
      speaker: media_resampling_speaker
      format: FLAC 
      num_channels: 2
      sample_rate: 48000



  # New Sendspin-aware media player (recommended for synchronized playback)
  - platform: speaker_source
    id: sendspin_media_player
    name: "Media Player (Sendspin)"    ### CHANGE AS REQUIRED ###
    media_pipeline:
      speaker: media_resampling_speaker
      sources:
        - sendspin_media_source
      format: FLAC
      num_channels: 2
      sample_rate: 48000
    # volume_min/max etc. as you like
    volume_min: 0.4
    volume_max: 0.95
    volume_increment: 0.05

  # Optional group controller (controls the whole Sendspin group)
  - platform: sendspin
    name: "Media Player Group"           ### CHANGE AS REQUIRED ###

###    You now have two media players:
###    Media Player (Local) → for direct local control / casting from HA
###    Media Player (Sendspin) → for synced multi-room playback via Music Assistant

